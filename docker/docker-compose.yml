version: '3.8'

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - TOR_PROXY_URL=socks5://tor-proxy:9050
    depends_on:
      - tor-proxy

  tor-proxy:
    image: dperson/torproxy:latest
    ports:
      - "9050:9050"
      - "8118:8118"   # Privoxy HTTP proxy (optional)
    restart: unless-stopped
